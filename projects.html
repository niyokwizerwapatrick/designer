<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Programming Search</title>
<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}
h1{
  color:#00f5ff;
  margin-bottom:20px;
  text-align:center;
  text-shadow:0 0 10px #00f5ff, 0 0 20px #3b82f6;
}
.search-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:15px;
  width:100%;
  max-width:600px;
}
#searchInput{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:16px;
  margin-bottom:5px;
  background:#1f2937;
  color:white;
}
#searchInput:focus{
  outline:none;
  box-shadow:0 0 15px #06b6d4;
}
#suggestions{
  width:100%;
  background:#1f2937;
  border-radius:6px;
  max-height:120px;
  overflow-y:auto;
}
.suggestion{
  padding:8px;
  cursor:pointer;
  transition:0.2s;
}
.suggestion:hover{
  background:#3b82f6;
}
#searchBtn{
  padding:10px 15px;
  margin-top:5px;
  border-radius:8px;
  border:none;
  background:linear-gradient(45deg,#06b6d4,#3b82f6);
  color:white;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}
#searchBtn:hover{
  background:linear-gradient(45deg,#3b82f6,#06b6d4);
}
.languages{
  margin:15px 0;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.lang-btn{
  padding:8px 14px;
  border-radius:6px;
  background:linear-gradient(45deg,#facc15,#f97316);
  color:black;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 10px #facc15;
}
.lang-btn:hover{
  background:linear-gradient(45deg,#f97316,#facc15);
  box-shadow:0 0 20px #f97316;
}
iframe{
  width:90%;
  height:500px;
  border:2px solid #3b82f6;
  border-radius:10px;
  margin-top:15px;
}
</style>
</head>
<body>

<h1>Cyberpunk Programming Search</h1>

<div class="search-container">
  <input type="text" id="searchInput" placeholder="Type your query...">
  <div id="suggestions"></div>
  <button id="searchBtn">Search</button>
</div>

<div class="languages">
  <div class="lang-btn" data-lang="Python">Python</div>
  <div class="lang-btn" data-lang="JavaScript">JavaScript</div>
  <div class="lang-btn" data-lang="Java">Java</div>
  <div class="lang-btn" data-lang="C++">C++</div>
  <div class="lang-btn" data-lang="C#">C#</div>
  <div class="lang-btn" data-lang="Go">Go</div>
  <div class="lang-btn" data-lang="Ruby">Ruby</div>
  <div class="lang-btn" data-lang="PHP">PHP</div>
  <div class="lang-btn" data-lang="Swift">Swift</div>
  <div class="lang-btn" data-lang="Kotlin">Kotlin</div>
</div>

<iframe id="resultFrame" src=""></iframe>

<script>
// ------------------------------
// Variables
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const suggestionsBox = document.getElementById("suggestions");
const resultFrame = document.getElementById("resultFrame");
const langBtns = document.querySelectorAll(".lang-btn");

// Autocomplete list (popular programming terms)
const autocompleteList = [
  "Python tutorial", "JavaScript guide", "Java programming",
  "C++ examples", "C# tutorial", "Go language", "Ruby on Rails",
  "PHP examples", "Swift tutorial", "Kotlin basics",
  "React JS", "Node JS", "Angular framework", "Django Python",
  "Flask Python", "Vue JS", "TypeScript", "Machine Learning Python",
  "Data Science R", "HTML CSS JS"
];

// ------------------------------
// Autocomplete functionality
searchInput.addEventListener("input", ()=>{
  const query = searchInput.value.toLowerCase();
  suggestionsBox.innerHTML = "";
  if(!query) return;
  const filtered = autocompleteList.filter(item => item.toLowerCase().includes(query));
  filtered.forEach(item=>{
    const div = document.createElement("div");
    div.textContent = item;
    div.classList.add("suggestion");
    div.addEventListener("click", ()=>{
      searchInput.value = item;
      suggestionsBox.innerHTML = "";
      performSearch(item);
    });
    suggestionsBox.appendChild(div);
  });
});

// ------------------------------
// Search function
function performSearch(query){
  if(!query) return;
  // Use Google search in iframe
  const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
  resultFrame.src = url;
}

// Button click
searchBtn.addEventListener("click", ()=>{
  const query = searchInput.value.trim();
  performSearch(query);
});

// Enter key triggers search
searchInput.addEventListener("keypress", e=>{
  if(e.key === "Enter"){
    searchBtn.click();
  }
});

// ------------------------------
// Programming language buttons
langBtns.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const lang = btn.dataset.lang;
    searchInput.value = lang;
    performSearch(lang);
  });
});
</script>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programming Languages Search</title>
<style>
body{
  font-family: Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px;
  background:#0f172a;
  color:white;
}
h1{
  color:#00f5ff;
  margin-bottom:20px;
}
input, button{
  padding:10px 15px;
  margin:5px;
  font-size:16px;
  border-radius:6px;
  border:none;
}
input{
  width:300px;
}
button{
  background:#00f5ff;
  color:black;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#06b6d4;
}
.languages{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.lang-btn{
  padding:8px 12px;
  border-radius:6px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.lang-btn:hover{
  background:#60a5fa;
}
</style>
</head>
<body>

<h1>Search Programming Languages on Google</h1>

<div>
  <input type="text" id="searchInput" placeholder="Search anything...">
  <button id="searchBtn">Search</button>
</div>

<div class="languages">
  <div class="lang-btn" data-lang="Python">Python</div>
  <div class="lang-btn" data-lang="JavaScript">JavaScript</div>
  <div class="lang-btn" data-lang="Java">Java</div>
  <div class="lang-btn" data-lang="C++">C++</div>
  <div class="lang-btn" data-lang="C#">C#</div>
  <div class="lang-btn" data-lang="Go">Go</div>
  <div class="lang-btn" data-lang="Ruby">Ruby</div>
  <div class="lang-btn" data-lang="PHP">PHP</div>
  <div class="lang-btn" data-lang="Swift">Swift</div>
  <div class="lang-btn" data-lang="Kotlin">Kotlin</div>
</div>

<script>
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const langBtns = document.querySelectorAll(".lang-btn");

// Function to search Google
function searchGoogle(query){
  if(!query) return;
  const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
  window.open(searchUrl, "_blank");
}

// Search button click
searchBtn.addEventListener("click", ()=>{
  const query = searchInput.value.trim();
  searchGoogle(query);
});

// Enter key in input
searchInput.addEventListener("keypress", e=>{
  if(e.key === "Enter"){
    searchBtn.click();
  }
});

// Click on language button → search Google with that language
langBtns.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const lang = btn.dataset.lang;
    searchGoogle(lang);
  });
});
</script>

</body>
</html>
